<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dice Pirate</title>
    <link
      rel="shortcut icon"
      href="../assets/img/fav.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="templates.js"></script>
    <script src="script.js" defer></script>
  </head>
  <body onload="oninit()">
    <div class="playgroundContainer" id="playgroundContainer"></div>
    <div class="gameOverview" id="gameOverview"></div>

    <div
      id="dialogOverlay"
      class="dialogOverlay d-none"
      onclick="closeDialog()"
    >
      <div class="dialogBox" onclick="event.stopPropagation()">
        <div class="dialogHeader">
          <span id="dialogTitle">Titel</span>
          <img src="../assets/icon/close.png" onclick="closeDialog()" />
        </div>

        <div id="dialogText" class="dialogText"></div>
        <div id="dialogButtons" class="dialogButtons"></div>
      </div>
    </div>
  </body>
</html>
